{# templates/componentes/navbar.html #}

{% if user.is_authenticated %}
  <nav class="fixed top-0 left-0 w-full h-12 border-b border-neutral-100
              bg-gradient-to-r from-red-700 via-red-800 to-red-900
              flex items-center justify-between z-50 px-4">
{% else %}
  <nav class="fixed top-0 left-0 w-full h-12 flex items-center justify-between z-50 px-4">
{% endif %}

  <!-- Botón hamburguesa + título -->
  <div class="flex items-center">
    <button id="hamburgerButton" class="text-white p-2 mr-2 focus:outline-none">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
    <h1 class="text-white text-md font-semibold">GESTIÓN INVENTARIO ADR</h1>
  </div>

  <!-- Menú usuario + cerrar sesión -->
  <div class="flex items-center space-x-4">
    {% if user.is_authenticated %}
      <div id="userMenuButton" class="cursor-pointer flex items-center space-x-2">
        <span class="text-white text-sm italic">
          Usuario en línea: {{ user.first_name|capfirst }} {{ user.last_name|capfirst }} | {{ group_name_singular }}
        </span>
        <img class="w-9 h-9 rounded-full" src="{{ user.profile.image.url }}" alt="{{ user.username }}">
      </div>
      <form method="POST" action="{% url 'logout' %}" class="inline">
        {% csrf_token %}
        <button type="submit"
                class="text-white text-xs font-semibold px-2 py-1 rounded bg-red-800 hover:bg-red-900
                       focus:outline-none focus:ring-2 focus:ring-red-800 focus:ring-opacity-50 transition">
          Cerrar Sesión
        </button>
      </form>
    {% endif %}
  </div>
</nav>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (window.navbarScriptInitialized) return;
    window.navbarScriptInitialized = true;

    const isAuth = {{ user.is_authenticated|yesno:"true,false" }};
    if (!isAuth) return;

    const hamburger = document.getElementById('hamburgerButton');
    const sidebar   = document.getElementById('sidebar');

    hamburger?.addEventListener('click', function(e) {
      e.stopPropagation();
      sidebar.classList.toggle('left-[-300px]');
      sidebar.classList.toggle('left-0');
    });

    document.addEventListener('click', function(e) {
      if (sidebar.classList.contains('left-0')
          && !sidebar.contains(e.target)
          && !hamburger.contains(e.target)) {
        sidebar.classList.replace('left-0', 'left-[-300px]');
      }
    });
  });
</script>
